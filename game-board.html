<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Piu</title>
<link rel="stylesheet" href="css/piu-tokens.css"/>
<link rel="manifest" href="/manifest.json"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Piu"/>
<meta name="theme-color" content="#000"/>
<link rel="apple-touch-icon" href="/icons/icon-192.png"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:-apple-system,sans-serif;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:none}
canvas{display:block;position:absolute;top:0;left:0;width:100%;height:100%}
.hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:max(14px,env(safe-area-inset-top)) 20px 0;pointer-events:none;z-index:2}
.hud-score{font-size:28px;font-weight:700;letter-spacing:-.02em;color:#fff;transition:transform .2s}
.hud-center{text-align:center;font-size:10px;color:rgba(255,255,255,.35)}
.hud-round{font-size:15px;color:rgba(255,255,255,.75);font-weight:590}
.msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:42px;font-weight:700;color:#fff;pointer-events:none;z-index:3;opacity:0;transition:opacity .15s;text-shadow:0 0 40px rgba(255,255,255,.5)}
.msg.show{opacity:1}
.cd{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(.4);font-size:90px;font-weight:700;color:#fff;pointer-events:none;z-index:3;opacity:0;transition:all .18s cubic-bezier(.34,1.56,.64,1)}
.cd.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.overlay{position:absolute;inset:0;background:rgba(0,0,0,.93);display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:10;padding:40px}
.overlay.show{display:flex}
.overlay-title{font-size:36px;font-weight:700;color:#fff}
.overlay-scores{display:flex;align-items:center;gap:18px;font-family:monospace;font-size:52px;font-weight:590;color:#fff}
.overlay-sub{font-size:13px;color:rgba(255,255,255,.45)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 32px;border:1px solid rgba(255,255,255,.2);border-radius:999px;background:rgba(255,255,255,.06);color:#fff;font-size:15px;font-weight:590;cursor:pointer;min-width:120px}
.btn:active{transform:scale(.96);background:rgba(255,255,255,.14)}
.btn-p{background:#fff;border-color:#fff;color:#000}.btn-p:active{background:#ddd}
.btn-g{background:transparent;border-color:transparent;color:rgba(255,255,255,.45)}
.heart{position:absolute;pointer-events:none;z-index:4;font-size:28px;animation:hf 2.2s ease-out forwards}
@keyframes hf{0%{opacity:1;transform:translateY(0)scale(.4)rotate(0)}50%{opacity:1;transform:translateY(-100px)scale(1.3)rotate(15deg)}100%{opacity:0;transform:translateY(-220px)scale(.3)rotate(-25deg)}}
.flash{position:absolute;inset:0;background:#fff;pointer-events:none;z-index:2;opacity:0;transition:opacity .05s}
.flash.go{opacity:.25;transition:opacity 0s}
.exit-btn{position:absolute;bottom:20px;left:20px;z-index:5;width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:50%;color:rgba(255,255,255,.4);font-size:20px;cursor:pointer;text-decoration:none}
.exit-btn:active{background:rgba(255,255,255,.14);color:#fff}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="flash" id="flash"></div>
<div class="hud"><span class="hud-score" id="s1">0</span><div class="hud-center"><div class="hud-round">回合 <span id="rn">1</span></div><div><span id="ml"></span></div><div style="font-size:9px;opacity:.25"><span id="wc"></span></div></div><span class="hud-score" id="s2">0</span></div>
<div class="msg" id="msg"></div><div class="cd" id="cd"></div>
<div class="overlay" id="lo"><div style="color:#fff;font-size:28px;font-weight:700">WiFi</div><div style="color:rgba(255,255,255,.5);font-size:14px;text-align:center;max-width:260px;line-height:1.6"></div><div id="lc" style="display:flex;flex-direction:column;align-items:center;gap:12px;width:100%;max-width:280px"><button class="btn btn-p" onclick="cr()" style="width:100%"></button><div id="rcd" style="display:none;text-align:center"><div style="font-size:11px;color:rgba(255,255,255,.35)"></div><div style="font-family:monospace;font-size:52px;font-weight:700;color:#fff;letter-spacing:.08em" id="rct"></div><div style="font-size:13px;color:rgba(255,255,255,.4);margin-top:4px"></div></div></div><div id="lj" style="display:flex;flex-direction:column;align-items:center;gap:10px;width:100%;max-width:280px"><input id="jc" type="text" inputmode="numeric" maxlength="4" placeholder="" style="width:100%;padding:12px 16px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:12px;color:#fff;font-size:20px;text-align:center;letter-spacing:.12em;outline:none;font-family:monospace"><button class="btn btn-p" onclick="jr()" style="width:100%"></button></div><button class="btn btn-g" onclick="location.href='index.html'"></button></div>
<a class="exit-btn" href="index.html" title="退出">✕</a>
<div class="overlay" id="go"><div class="overlay-title" id="gt"></div><div class="overlay-scores"><span id="gs1">0</span><span style="font-size:16px;color:rgba(255,255,255,.35)">:</span><span id="gs2">0</span></div><div class="overlay-sub" id="gsub"></div><button class="btn btn-p" onclick="rs()"></button><button class="btn btn-g" onclick="location.href='index.html'"></button></div>
<script>
const cv=document.getElementById('c'),ct=cv.getContext('2d');
const q=new URLSearchParams(location.search);
let gm=q.get('mode')||'ai',df=q.get('diff')||'medium';
const dpr=Math.min(devicePixelRatio||1,2);
let W,H;
function rz(){W=innerWidth;H=innerHeight;cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+'px';cv.style.height=H+'px';ct.setTransform(dpr,0,0,dpr,0,0)}
rz();addEventListener('resize',rz);
if(!CanvasRenderingContext2D.prototype.roundRect){CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){if(typeof r==='number')r={tl:r,tr:r,br:r,bl:r};this.moveTo(x+r.tl,y);this.lineTo(x+w-r.tr,y);this.quadraticCurveTo(x+w,y,x+w,y+r.tr);this.lineTo(x+w,y+h-r.br);this.quadraticCurveTo(x+w,y+h,x+w-r.br,y+h);this.lineTo(x+r.bl,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r.bl);this.lineTo(x,y+r.tl);this.quadraticCurveTo(x,y,x+r.tl,y);this.closePath()}}

// === CONSTANTS ===
const BR=22,PW=100,PH=12,PY=70;          // ball radius, paddle
const GC=18,GR=28;                       // grid cols/rows
const WS=130,WR=120;                     // gravity well strength/radius (gentle)
const BS=3.5,BM=8;                       // ball speed (slower start), max
const PUS=30,PUI=6000,MPU=2;            // powerup size/interval/max
const WIN=5,CFW=3,CMW=6;                // win scores

// === STATE ===
let g,af,sk=0,gv=[],gcw,gch,cf=0,tcf=0;
let pts=[],apts=[],dusts=[];            // event particles, ambient, ball dust
let ballPulse=0,ballPulseT=0;           // ball aura pulse

function ig(){gcw=W/(GC-1);gch=H/(GR-1);gv=[];for(let r=0;r<GR;r++){gv[r]=[];for(let c=0;c<GC;c++)gv[r][c]={bx:c*gcw,by:r*gch,dx:0,dy:0}}}

function mk(){
  const cp=gm==='couple';
  return{ball:{x:W/2,y:H/2,vx:(Math.random()-.5)*2,vy:BS*(Math.random()>.5?1:-1),r:BR,st:1,sa:1,trail:[],state:'normal'},
    pad:{x:W/2-PW/2,y:H-PY,w:cp?PW*.85:PW,h:PH},
    ai:{x:W/2-PW/2,y:PY-PH,w:PW,h:PH,tx:W/2,sp:4.5},
    pus:[],sc:[0,0],rsc:[0,0],round:1,phase:'cd',pt:0,cd:3,ls:null,diff:df,mode:gm,hits:0,gt:0,couple:cp}
}

function spu(){if(!g||g.phase!=='playing'||g.pus.length>=MPU)return;const t=['grow','shrink'][Math.random()*2|0];g.pus.push({x:40+Math.random()*(W-80),y:100+Math.random()*(H-200),type:t,sz:PUS,pl:Math.random()*Math.PI*2})}

// === PARTICLES ===
function spt(x,y,n,ty,dir){const m={blue:[0,198,255],red:[255,68,112],green:[0,255,110],orange:[255,140,40],wall:[200,200,220],heart:[255,105,180],dust:[0,180,230]};const c=m[ty]||[255,255,255];for(let i=0;i<n;i++){let vx,vy;if(dir!=null){const a=dir+Math.random()*1.2-.6;const s=1+Math.random()*5;vx=Math.cos(a)*s;vy=Math.sin(a)*s}else{const a=Math.random()*Math.PI*2,s=1+Math.random()*4;vx=Math.cos(a)*s;vy=Math.sin(a)*s}pts.push({x,y,vx,vy,r:1.5+Math.random()*4,life:.5+Math.random()*.5,rgb:c,ty:ty||''})}}
function sptAmb(){for(let i=0;i<25;i++){apts.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:.6+Math.random()*1.2,a:.15+Math.random()*.2,pl:Math.random()*Math.PI*2})}}
function sptDust(){if(!g)return;const b=g.ball;const sp=Math.hypot(b.vx,b.vy);if(sp>3){const n=Math.floor(sp/4);for(let i=0;i<n;i++){dusts.push({x:b.x+(Math.random()-.5)*b.r*b.sa,y:b.y+(Math.random()-.5)*b.r*b.sa,vx:(Math.random()-.5)*1,vy:(Math.random()-.5)*1,life:.4+Math.random()*.3})}}}
sptAmb();

// === AUDIO ===
let AC=null;function iac(){if(!AC){try{AC=new(window.AudioContext||window.webkitAudioContext)}catch(e){}}if(AC&&AC.state==='suspended')AC.resume()}
function bp(f,ty,d,v,ge){if(!AC)return;try{const t=AC.currentTime,o=AC.createOscillator(),gn=AC.createGain();o.type=ty;o.frequency.setValueAtTime(f,t);if(ge)o.frequency.linearRampToValueAtTime(f*ge,t+d);gn.gain.setValueAtTime(Math.min(v,.3),t);gn.gain.setValueAtTime(.001,t+d-.01);o.connect(gn);gn.connect(AC.destination);o.start(t);o.stop(t+d)}catch(e){}}
function sfxH(){bp(800,'sine',.06,.22,1.8);bp(400,'sine',.03,.10,2.2)};function sfxW(){bp(130,'square',.04,.06,null)};function sfxG(){bp(440,'sine',.08,.22,1.8);setTimeout(()=>bp(660,'sine',.07,.18,1.5),70);setTimeout(()=>bp(880,'sine',.05,.16,null),140)};function sfxL(){bp(180,'sawtooth',.07,.28,.4)};function sfxPU(){bp(600,'sine',.04,.09,2);setTimeout(()=>bp(900,'sine',.04,.09,1.5),50);setTimeout(()=>bp(1200,'sine',.03,.1,null),100)};function sfxCD(){bp(200,'sine',.05,.12,null)};function sfxGO(){bp(520,'triangle',.08,.22,2)};function sfxWin(){bp(523,'sine',.12,.26,1.3);setTimeout(()=>bp(659,'sine',.10,.26,1.3),130);setTimeout(()=>bp(784,'sine',.08,.35,null),260)};function sfxLose(){bp(200,'sawtooth',.08,.35,.5)}

// === VIBRATION ===
function vb(ms){try{if(navigator.vibrate)navigator.vibrate(ms)}catch(e){}}
function vh(){vb(8)};function vw(){vb(4)};function vg(){vb([18,40,18,40,35])};function vpu(){vb([12,25,12])};function vcd(){vb(20)};function vGO(){vb([25,50,45])}

// === COLOR (progressive: blue-white -> full neon) ===
function C(r,g,b,a){const c=cf;const bwR=210,bwG=230,bwB=252;return'rgba('+Math.round(bwR+(r-bwR)*c)+','+Math.round(bwG+(g-bwG)*c)+','+Math.round(bwB+(b-bwB)*c)+','+a+')'}

// === PHYSICS ===
function up(dt){
  if(!g)return;const b=g.ball,pp=g.pad,ai=g.ai;
  cf+=(tcf-cf)*.05;if(Math.abs(tcf-cf)<.001)cf=tcf;
  if(sk>0)sk*=.82;if(sk<.05)sk=0;
  b.sa+=(b.st-b.sa)*.28;

  if(g.phase==='cd'){g.pt+=dt;if(g.pt>1000){g.pt=0;g.cd--;ucd();if(g.cd<=0){g.phase='playing';hcd();if(g.ls)b.vy=g.ls===1?BS:-BS}}return}
  if(g.phase==='goal'){g.pt+=dt;if(g.pt>2600){g.phase='cd';g.pt=0;g.cd=3;rb();ucd()}return}
  if(g.phase!=='playing')return;

  if(g.mode!=='local'&&g.mode!=='couple'&&g.mode!=='nh'&&g.mode!=='ng'){ai.tx=b.x;const d=ai.tx-(ai.x+ai.w/2);const sp=g.diff==='hard'?7:g.diff==='easy'?3:4.8;if(Math.abs(d)>5)ai.x+=Math.sign(d)*sp;if(g.diff==='easy')ai.x+=(Math.random()-.5)*4;else if(g.diff==='medium')ai.x+=(Math.random()-.5)*1.8;ai.x=Math.max(0,Math.min(W-ai.w,ai.x))}

  b.x+=b.vx;b.y+=b.vy;
  // Trail
  const sp=Math.hypot(b.vx,b.vy);
  if(sp>2){b.trail.push({x:b.x,y:b.y,life:1,r:b.r*b.sa,st:b.state});if(b.trail.length>20)b.trail.shift()}
  b.trail.forEach(t=>t.life-=.05);b.trail=b.trail.filter(t=>t.life>0);
  // Dust
  sptDust();

  if(b.x-b.r<0){b.x=b.r;b.vx*=-.86;ew()}
  if(b.x+b.r>W){b.x=W-b.r;b.vx*=-.86;ew()}

  const r=b.r*b.sa;
  if(b.vy>0&&b.y+r>=pp.y&&b.y+r<=pp.y+pp.h+10&&b.x>pp.x-r*.5&&b.x<pp.x+pp.w+r*.5)eh(pp,1);
  if(b.vy<0&&b.y-r<=ai.y+ai.h&&b.y-r>=ai.y-10&&b.x>ai.x-r*.5&&b.x<ai.x+ai.w+r*.5)eh(ai,2);

  if(b.y-r>H){gl(2);return}if(b.y+r<0){gl(1);return}

  for(let i=g.pus.length-1;i>=0;i--){const pu=g.pus[i];const dx=b.x-pu.x,dy=b.y-pu.y;if(Math.sqrt(dx*dx+dy*dy)<r+pu.sz/2){epu(pu);g.pus.splice(i,1)}}
  // Particles decay
  pts.forEach(pt=>{pt.x+=pt.vx;pt.y+=pt.vy;pt.life-=.022});pts=pts.filter(pt=>pt.life>0);
  dusts.forEach(d=>{d.x+=d.vx;d.y+=d.vy;d.life-=.035});dusts=dusts.filter(d=>d.life>0);
  // Ambient particles
  apts.forEach(a=>{a.x+=a.vx;a.y+=a.vy;if(a.x<0)a.x=W;if(a.x>W)a.x=0;if(a.y<0)a.y=H;if(a.y>H)a.y=0;a.pl+=.01;if(g){const dx=a.x-b.x,dy=a.y-b.y,dd=Math.sqrt(dx*dx+dy*dy);if(dd<200){const f=(1-dd/200)*.6;a.vx+=dx/dd*f*.02;a.vy+=dy/dd*f*.02}const ms=.3;a.vx*=1-ms*.016;a.vy*=1-ms*.016}});
}

function ew(){const bx=g.ball.x;spt(bx,g.ball.y<H/2?0:H,8,'wall',g.ball.y<H/2?Math.PI/2:-Math.PI/2);sk=Math.min(sk+1,4);sfxW();vw()}
function eh(pad,pl){
  const b=g.ball;const hx=b.x-(pad.x+pad.w/2);const rx=hx/(pad.w/2);
  const ang=rx*.75;const sp=Math.min(Math.hypot(b.vx,b.vy)*1.06,BM);
  b.vx=Math.sin(ang)*sp;b.vy=(pl===1?-1:1)*Math.abs(Math.cos(ang)*sp);
  if(pl===1)b.y=pad.y-b.r*b.sa-1;else b.y=pad.y+pad.h+b.r*b.sa+1;
  b.st=.7;ballPulse=1;ballPulseT=0;  // trigger aura burst
  setTimeout(()=>{if(g)g.ball.st=1.35},50);setTimeout(()=>{if(g)g.ball.st=1.0},160);
  // Directional particle spray
  const sprayDir=pl===1?-Math.PI/2:Math.PI/2;
  spt(b.x,b.y,18,pl===1?'blue':'red',sprayDir);
  sk=Math.min(sk+2,6);g.hits++;updateCF();sfxH();vh()
}
function epu(pu){
  const b=g.ball;
  if(pu.type==='grow'){b.r=BR*1.9;b.st=1.9;b.state='grow';spt(pu.x,pu.y,20,'green');ballPulse=.6}
  else{b.r=BR*.65;b.st=.65;b.state='shrink';spt(pu.x,pu.y,18,'orange');ballPulse=.6}
  b.sa=b.st;updateCF();sfxPU();vpu();
  setTimeout(()=>{if(g){g.ball.r=BR;g.ball.st=1.0;g.ball.state='normal'}},2500)
}
function updateCF(){if(!g)return;const ts=g.sc[0]+g.sc[1];tcf=Math.min(1,Math.min(g.hits*.04,.5)+Math.min(ts*.08,.5))}
function gl(sc){
  g.phase='goal';g.pt=0;
  // Freeze ball for dramatic pause
  g.ball.vx=0;g.ball.vy=0;
  if(g.couple){if(sc===2){g.sc[1]++;g.rsc[1]++}else{g.rsc[0]+=.5;g.sc[0]=Math.floor(g.rsc[0])}}
  else{g.sc[sc-1]++}
  g.ls=sc;g.hits=0;g.pus=[];tcf=Math.max(0,tcf-.15);
  sk=12;spt(g.ball.x,g.ball.y,55,sc===1?'blue':'red');
  // Arcade-style flash sequence: flash on, off, on
  flashScreen();setTimeout(()=>flashScreen(),200);setTimeout(()=>flashScreen(),400);
  if(sc===1){sfxG();vg()}else{sfxL();if(g.couple)shrt(g.ball.x,g.ball.y)}
  sm(sc);uh();
  const wt=g.couple?(sc===2?CFW:CMW):WIN;
  const chk=g.couple?(sc===2?g.sc[1]:Math.floor(g.rsc[0])):g.sc[sc-1];
  if(chk>=wt){setTimeout(()=>{g.phase='gameover';sgo(sc)},1400)}
  g.round++
}
function rb(){const b=g.ball;b.x=W/2;b.y=H/2;b.vx=(Math.random()-.5)*2;b.vy=BS*(g.ls===1?-1:1);b.r=BR;b.st=1;b.sa=1;b.trail=[];b.state='normal'}
function shrt(x,y){const h=document.createElement('div');h.className='heart';h.textContent=['❤️','💕','💖','💗'][Math.random()*4|0];h.style.left=x+'px';h.style.top=y+'px';h.style.animationDuration=(1.5+Math.random())+'s';document.body.appendChild(h);setTimeout(()=>h.remove(),2500);spt(x,y,12,'heart')}

// === GRID (fluid ripples + electric glow) ===
function ug(){
  if(!g)return;const b=g.ball;
  for(let r=0;r<GR;r++)for(let c=0;c<GC;c++){const v=gv[r][c];const dx=v.bx-b.x,dy=v.by-b.y;const d=Math.sqrt(dx*dx+dy*dy);
    if(d<WR){const s=WS/(1+d*d/700);const f=1-d/WR;const st=s*f*f;const ndx=dx/(d+.01),ndy=dy/(d+.01);
      v.dx=ndx*st*(b.sa*1.15);v.dy=ndy*st*(b.sa*1.15)}
    else{v.dx*=.88;v.dy*=.88}
    v.dx*=.93;v.dy*=.93}
}

// === RENDER ===
function dr(){
  ct.clearRect(0,0,W,H);
  let sx=0,sy=0;if(sk>.2){sx=(Math.random()-.5)*sk*2;sy=(Math.random()-.5)*sk*2}
  ct.save();ct.translate(sx,sy);
  ct.fillStyle='#000';ct.fillRect(-10,-10,W+20,H+20);

  // Ambient particles (behind grid)
  for(const a of apts){ct.beginPath();ct.arc(a.x,a.y,a.r,0,Math.PI*2);ct.fillStyle='rgba(0,198,255,'+(a.a+.05*Math.sin(a.pl))+')';ct.fill()}

  dg();  // grid
  if(g){for(const pu of g.pus){pu.pl+=.05;dp(pu)}}

  // Ball trail
  if(g){for(const t of g.ball.trail){
    const tc=t.st==='grow'?[0,255,110]:t.st==='shrink'?[255,140,40]:[0,198,255];
    ct.beginPath();ct.arc(t.x,t.y,t.r*t.life*.7,0,Math.PI*2);ct.fillStyle='rgba('+tc[0]+','+tc[1]+','+tc[2]+','+(t.life*.35)+')';ct.fill()}}

  // Ball dust
  for(const d of dusts){ct.beginPath();ct.arc(d.x,d.y,2*d.life,0,Math.PI*2);ct.fillStyle=C(0,180,230,d.life*.5);ct.fill()}

  if(g)db();
  if(g){dpd(g.pad,1);dpd(g.ai,2)}
  dl();

  // Event particles
  for(const pt of pts){ct.beginPath();ct.arc(pt.x,pt.y,pt.r*pt.life,0,Math.PI*2);ct.fillStyle='rgba('+pt.rgb[0]+','+pt.rgb[1]+','+pt.rgb[2]+','+(pt.life*.7)+')';ct.fill()}

  ct.restore();
}

function dg(){
  // Draw deformed grid with ripples and electric glow
  for(let r=0;r<GR;r++){ct.beginPath();let s=false;for(let c=0;c<GC;c++){const v=gv[r][c];const x=v.bx+v.dx,y=v.by+v.dy;if(!s){ct.moveTo(x,y);s=true}else ct.lineTo(x,y)}
    let a=.06;let lw=.4;if(g){const b=g.ball;const px=1-Math.abs(r-(b.y/H*GR))/(GR*.35);if(px>0){a+=px*.25;lw+=px*1.2}}
    ct.strokeStyle='rgba(0,198,255,'+Math.min(a,.45)+')';ct.lineWidth=Math.min(lw,1.6);ct.stroke()}
  for(let c=0;c<GC;c++){ct.beginPath();let s=false;for(let r=0;r<GR;r++){const v=gv[r][c];const x=v.bx+v.dx,y=v.by+v.dy;if(!s){ct.moveTo(x,y);s=true}else ct.lineTo(x,y)}
    let a=.06;let lw=.4;if(g){const b=g.ball;const px=1-Math.abs(c-(b.x/W*GC))/(GC*.35);if(px>0){a+=px*.25;lw+=px*1.2}}
    ct.strokeStyle='rgba(0,198,255,'+Math.min(a,.45)+')';ct.lineWidth=Math.min(lw,1.6);ct.stroke()}
}

function db(){
  const b=g.ball,r=b.r*b.sa,x=b.x,y=b.y;
  // Pulse
  ballPulseT+=.06;const pp=ballPulse*Math.exp(-ballPulseT*2)*6;ballPulse*=Math.max(0,1-ballPulseT*.08);

  // Outer aura ring (pulses with ball speed and hits)
  const auraR=r+6+pp;const sp=Math.hypot(b.vx,b.vy);const auraAlpha=.25+sp/BM*.2;
  ct.beginPath();ct.arc(x,y,auraR,0,Math.PI*2);ct.strokeStyle='rgba(0,200,255,'+auraAlpha+')';ct.lineWidth=3+pp*.3;ct.stroke();

  // Second wider ring
  ct.beginPath();ct.arc(x,y,auraR+5,0,Math.PI*2);ct.strokeStyle='rgba(0,200,255,'+(auraAlpha*.5)+')';ct.lineWidth=1.5;ct.stroke();

  // Main body (color varies by state)
  const fillCol=b.state==='grow'?'#00e870':b.state==='shrink'?'#ff8c28':'#00b8f0';
  ct.fillStyle=fillCol;ct.beginPath();ct.arc(x,y,r,0,Math.PI*2);ct.fill();

  // Inner bright core
  const coreR=r*.35;ct.fillStyle='#fff';ct.beginPath();ct.arc(x-r*.15,y-r*.15,coreR,0,Math.PI*2);ct.fill();

  // Outer bright edge ring
  ct.beginPath();ct.arc(x,y,r,0,Math.PI*2);ct.strokeStyle='rgba(255,255,255,.35)';ct.lineWidth=2;ct.stroke();

  // Dark separator ring between core and outer
  ct.beginPath();ct.arc(x,y,r*.7,0,Math.PI*2);ct.strokeStyle='rgba(0,0,0,.15)';ct.lineWidth=1;ct.stroke();
}

function dpd(pd,pl){
  const px=pd.x,py=pd.y,pw=pd.w,ph=pd.h,isB=pl===1;
  ct.fillStyle=isB?C(0,160,220,1):C(220,50,80,1);ct.beginPath();ct.roundRect(px,py,pw,ph,5);ct.fill();
  // Top highlight line
  ct.beginPath();ct.moveTo(px+6,py+2);ct.lineTo(px+pw-6,py+2);ct.strokeStyle='#fff';ct.lineWidth=1.5;ct.stroke();
  // Border
  ct.beginPath();ct.roundRect(px,py,pw,ph,5);ct.strokeStyle=isB?'rgba(0,100,160,.7)':'rgba(180,30,60,.7)';ct.lineWidth=1;ct.stroke();
}

function dl(){
  const y1=g.pad.y+g.pad.h+6;ct.strokeStyle=C(0,198,255,.3);ct.lineWidth=1.5;ct.setLineDash([W*.7,W*.3]);ct.beginPath();ct.moveTo(0,y1);ct.lineTo(W,y1);ct.stroke();ct.setLineDash([]);
  ct.strokeStyle=C(0,198,255,.1);ct.lineWidth=.7;ct.beginPath();ct.moveTo(0,y1+7);ct.lineTo(W,y1+7);ct.stroke();
  const y2=g.ai.y-6;ct.strokeStyle=C(255,68,112,.3);ct.lineWidth=1.5;ct.setLineDash([W*.7,W*.3]);ct.beginPath();ct.moveTo(0,y2);ct.lineTo(W,y2);ct.stroke();ct.setLineDash([]);
  ct.strokeStyle=C(255,68,112,.1);ct.lineWidth=.7;ct.beginPath();ct.moveTo(0,y2-7);ct.lineTo(W,y2-7);ct.stroke()
}

function dp(pu){
  const s=pu.sz/2,gl=.5+Math.sin(pu.pl)*.3,isG=pu.type==='grow';const cr=isG?0:255,cg=isG?255:140,cb=isG?110:40;
  ct.save();ct.translate(pu.x,pu.y);
  // Outer glow ring
  ct.beginPath();ct.roundRect(-s-5,-s-5,s*2+10,s*2+10,7);ct.strokeStyle='rgba('+cr+','+cg+','+cb+','+(gl*.5)+')';ct.lineWidth=2;ct.stroke();
  // Fill
  ct.fillStyle='rgba('+cr+','+cg+','+cb+',.1)';ct.beginPath();ct.roundRect(-s,-s,s*2,s*2,4);ct.fill();
  // Border
  ct.beginPath();ct.roundRect(-s,-s,s*2,s*2,4);ct.strokeStyle='rgba('+cr+','+cg+','+cb+','+(gl*.8)+')';ct.lineWidth=2;ct.stroke();
  // Top highlight
  ct.beginPath();ct.moveTo(-s+4,-s+2);ct.lineTo(s-4,-s+2);ct.strokeStyle='#fff';ct.lineWidth=1;ct.stroke();
  // Icon
  const ic=s*.45;ct.strokeStyle='rgba('+cr+','+cg+','+cb+','+gl+')';ct.lineWidth=2.5;ct.lineCap='round';
  ct.beginPath();if(isG){ct.moveTo(0,-ic);ct.lineTo(0,ic);ct.moveTo(-ic,0);ct.lineTo(ic,0)}else{ct.moveTo(-ic,0);ct.lineTo(ic,0)}ct.stroke();
  ct.restore()
}

// === HUD ===
function sm(sc){const m=document.getElementById('msg');if(sc===1){m.textContent='Piu!';m.style.color='#00e676'}else{m.textContent='No…';m.style.color='#ff5252'}m.className='msg show';m.style.fontSize='52px';const el=document.getElementById(sc===1?'s1':'s2');el.style.transform='scale(1.5)';el.style.transition='transform .4s cubic-bezier(.34,1.56,.64,1)';setTimeout(()=>{el.style.transform='';el.style.transition='transform .2s'},500);setTimeout(()=>{m.classList.remove('show');m.style.fontSize='42px'},2200)}
function ucd(){const cd=document.getElementById('cd');if(g.cd>0){cd.textContent=g.cd;cd.classList.add('show');cd.style.color=C(255,255,255,1);sfxCD();vcd();setTimeout(()=>cd.classList.remove('show'),700)}else{cd.textContent='GO!';cd.classList.add('show');sfxGO();vGO();flashScreen();setTimeout(()=>cd.classList.remove('show'),600)}}
function hcd(){document.getElementById('cd').classList.remove('show')}
function flashScreen(){const fl=document.getElementById('flash');fl.classList.add('go');setTimeout(()=>fl.classList.remove('go'),80)}
function uh(){if(!g)return;document.getElementById('s1').textContent=g.sc[0];document.getElementById('s2').textContent=g.sc[1];document.getElementById('rn').textContent=g.round;const lb={ai:'AI '+(g.diff==='hard'?'困难':g.diff==='easy'?'简单':'普通'),local:'同屏双人',couple:'情侣对战'};document.getElementById('ml').textContent=lb[g.mode]||lb.ai;document.getElementById('wc').textContent=g.couple?('女'+CFW+'分 · 男'+CMW+'分获胜'):'先到5分获胜'}
function sgo(w){const ov=document.getElementById('go'),ti=document.getElementById('gt'),su=document.getElementById('gsub');if(g.couple){ti.textContent=w===2?'女生赢了！':'男生赢了！';su.textContent=w===2?'男生要加油哦~':'女生不会生气吧？'}else if(g.mode==='local'){ti.textContent=(w===1?'蓝方':'红方')+'胜利！';su.textContent=''}else{ti.textContent=w===1?'你赢了！':'你输了';su.textContent=''}document.getElementById('gs1').textContent=g.sc[0];document.getElementById('gs2').textContent=g.sc[1];ov.classList.add('show');if(w===1)sfxWin();else sfxLose()}
function rs(){document.getElementById('go').classList.remove('show');document.getElementById('msg').classList.remove('show');g=mk();cf=0;tcf=0;pts=[];dusts=[];apts=[];sptAmb();sk=0;ig();uh();ucd()}

// === TOUCH ===
let t1=null,t2=null,tx=null;
cv.addEventListener('pointerdown',e=>{iac();if(!g||(g.phase!=='playing'&&g.phase!=='cd'))return;if(g.mode==='local'||g.mode==='couple'){if(e.clientY<H/2&&t2===null)t2=e.pointerId;else if(e.clientY>=H/2&&t1===null){t1=e.pointerId;tx=e.clientX}}else{t1=e.pointerId;tx=e.clientX}});
cv.addEventListener('pointermove',e=>{if(!g||g.phase!=='playing')return;if(g.mode==='local'||g.mode==='couple'){if(e.pointerId===t1){const d=e.clientX-(tx||e.clientX);g.pad.x+=d;g.pad.x=Math.max(0,Math.min(W-g.pad.w,g.pad.x));tx=e.clientX}else if(e.pointerId===t2){g.ai.x=e.clientX-g.ai.w/2;g.ai.x=Math.max(0,Math.min(W-g.ai.w,g.ai.x))}return}if(e.pointerId!==t1)return;const d=e.clientX-tx;g.pad.x+=d;g.pad.x=Math.max(0,Math.min(W-g.pad.w,g.pad.x));tx=e.clientX});
cv.addEventListener('pointerup',e=>{if(e.pointerId===t1)t1=null;if(e.pointerId===t2)t2=null});cv.addEventListener('pointerleave',()=>{t1=null;t2=null});cv.addEventListener('pointercancel',()=>{t1=null;t2=null});

// === LOOP ===
function lp(){if(g){ug();up(16);dr();uh()}af=requestAnimationFrame(lp)}
setInterval(()=>spu(),PUI);
if(gm!=='network'){g=mk();ig();uh();ucd();af=requestAnimationFrame(lp)}else{slb()}
document.addEventListener('keydown',e=>{if(!g)return;const s=14;if(e.key==='ArrowLeft')g.pad.x=Math.max(0,g.pad.x-s);if(e.key==='ArrowRight')g.pad.x=Math.min(W-g.pad.w,g.pad.x+s);if(e.key==='r'&&e.metaKey){e.preventDefault();rs()}});
document.addEventListener('click',()=>iac(),{once:true});document.addEventListener('touchstart',()=>iac(),{once:true});

// === NETWORK ===
let ws=null,np=null,nr=null,nop=W/2,lss=0;
function slb(){document.getElementById('lo').classList.add('show')}
function cr(){iac();cws().then(()=>{ws.send(JSON.stringify({action:'create'}))});document.getElementById('lc').querySelector('.btn').style.display='none';document.getElementById('lj').style.display='none'}
function jr(){const c=document.getElementById('jc').value.trim();if(c.length!==4)return;iac();cws().then(()=>{ws.send(JSON.stringify({action:'join',code:c}))})}
function cws(){return new Promise((rv,rj)=>{ws=new WebSocket('ws://'+location.hostname+':8765');ws.onopen=()=>rv();ws.onerror=()=>{alert('');rj()};ws.onclose=()=>{if(nr){alert('');location.reload()}};ws.onmessage=(e)=>{const m=JSON.parse(e.data);if(m.type==='room_created'){nr=m.code;np=m.player;document.getElementById('rct').textContent=m.code;document.getElementById('rcd').style.display='block'}else if(m.type==='joined'){nr=m.code;np=m.player;document.getElementById('lo').classList.remove('show');sng()}else if(m.type==='opponent_joined'){document.getElementById('lo').classList.remove('show');sng()}else if(m.type==='opponent_left'){alert('');location.reload()}else if(m.type==='sync'&&np===2){as(m.state)}else if(m.type==='relay'&&np===1){nop=m.data.x||nop;if(g)g.ai.x=nop}}})}
function sng(){g=mk();if(np===2){g.mode='ng'}else{g.mode='nh'}ig();uh();ucd();af=requestAnimationFrame(lp)}
function as(st){if(!g||g.mode!=='ng')return;g.ball.x=st.bx;g.ball.y=st.by;g.ball.vx=st.bvx;g.ball.vy=st.bvy;g.ball.r=st.br;g.ball.st=st.bs;g.ai.x=st.ax;g.sc[0]=st.s0;g.sc[1]=st.s1;g.round=st.rnd;g.phase=st.ph;cf=st.cf||0}
function shs(){if(!ws||!g||g.mode!=='nh')return;const n=Date.now();if(n-lss<50)return;lss=n;const b=g.ball;ws.send(JSON.stringify({action:'sync',state:{bx:b.x,by:b.y,bvx:b.vx,bvy:b.vy,br:b.r,bs:b.st,ax:g.pad.x,s0:g.sc[0],s1:g.sc[1],rnd:g.round,ph:g.phase,cf:cf}}))}
const _up=up;up=function(dt){if(g&&g.mode==='ng'){cf+=(tcf-cf)*.05;if(sk>0)sk*=.82;g.ball.sa+=(g.ball.st-g.ball.sa)*.28;updateCF();return}_up(dt);if(g&&g.mode==='nh')shs()};
cv.addEventListener('pointermove',e=>{if(g&&g.mode==='ng'){if(e.pointerId===t1){g.ai.x=e.clientX-g.ai.w/2;g.ai.x=Math.max(0,Math.min(W-g.ai.w,g.ai.x));if(ws)ws.send(JSON.stringify({action:'relay',data:{x:g.ai.x}}))}}});
if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});
