<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>PixPiuPiu</title>
  <link rel="stylesheet" href="css/piu-tokens.css" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PixPiuPiu" />
  <meta name="theme-color" content="#0a0a16" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #0a0a16;
      overflow: hidden;
      font-family: 'Courier New', monospace; text-rendering: optimizeSpeed; -webkit-font-smoothing: none; image-rendering: pixelated;
      -webkit-tap-highlight-color: transparent; text-rendering: optimizeSpeed; -webkit-font-smoothing: none;
      user-select: none; -webkit-user-select: none;
    }
    canvas { display: block; position: absolute; top: 0; left: 0; width: 100%; height: 100%; image-rendering: pixelated; }
    .ui-layer { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 32px 20px; pointer-events: none; }
    .ui-layer a, .ui-layer button { pointer-events: auto; }
    .logo-block { display: flex; gap: 4px; margin-bottom: 4px; }
    .logo-char { font-family: 'Courier New', monospace; text-rendering: optimizeSpeed; -webkit-font-smoothing: none; image-rendering: pixelated; font-size: 40px; font-weight: 900; letter-spacing: 2px; color: #00c6ff; text-shadow: 2px 2px 0 #006088, 4px 4px 0 rgba(0,0,0,.3); line-height: 1; }
    .logo-char.pink { color: #ff6090; text-shadow: 2px 2px 0 #882040, 4px 4px 0 rgba(0,0,0,.3); }
    .tagline { font-family: 'Courier New', monospace; text-rendering: optimizeSpeed; -webkit-font-smoothing: none; image-rendering: pixelated; font-size: 13px; font-weight: 700; letter-spacing: 4px; color: rgba(255,255,255,.4); margin: 8px 0 4px; }
    .subtitle { font-family: 'Courier New', monospace; text-rendering: optimizeSpeed; -webkit-font-smoothing: none; image-rendering: pixelated; font-size: 11px; color: rgba(255,255,255,.25); letter-spacing: 2px; margin-bottom: 36px; }
    .pixel-btn { display: inline-block; padding: 14px 36px; background: #00c6ff; color: #0a0a16; font-family: 'Courier New', monospace; text-rendering: optimizeSpeed; -webkit-font-smoothing: none; image-rendering: pixelated; font-size: 18px; font-weight: 900; letter-spacing: 3px; text-decoration: none; border: none; box-shadow: 4px 0 0 #0a0a16, -4px 0 0 #0a0a16, 0 4px 0 #0a0a16, 0 -4px 0 #0a0a16, 6px 6px 0 #006088, 6px 6px 0 2px #0a0a16; cursor: pointer; transition: all .08s; animation: btnBounce 2s ease-in-out infinite; }
    @keyframes btnBounce { 0%,100%{transform:translateY(0)} 3%,7%{transform:translateY(-4px)} 5%{transform:translateY(0)} }
    .pixel-btn:active { transform: translate(2px, 2px); box-shadow: 2px 0 0 #0a0a16, -2px 0 0 #0a0a16, 0 2px 0 #0a0a16, 0 -2px 0 #0a0a16, 4px 4px 0 #006088, 4px 4px 0 2px #0a0a16; }
    .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; max-width: 280px; margin-top: 36px; }
    .mode-card { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 14px 10px; background: rgba(255,255,255,.03); border: 2px solid rgba(255,255,255,.08); color: rgba(255,255,255,.45); font-family: 'Courier New', monospace; text-rendering: optimizeSpeed; -webkit-font-smoothing: none; image-rendering: pixelated; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-decoration: none; cursor: pointer; transition: all .1s steps(2); }
    .mode-card:active { border-color: #00c6ff; color: #00c6ff; background: rgba(0,198,255,.06); }
    .mode-icon { font-size: 22px; line-height: 1; }
    .info-footer { position: absolute; bottom: 22px; display: flex; flex-direction: column; align-items: center; gap: 4px; pointer-events: none; left: 50%; transform: translateX(-50%); }
    .info-row { font-family: 'Courier New', monospace; text-rendering: optimizeSpeed; -webkit-font-smoothing: none; image-rendering: pixelated; font-size: 10px; letter-spacing: 3px; color: rgba(255,255,255,.2); }
    .picker-overlay { position: absolute; inset: 0; z-index: 10; background: rgba(10,10,22,.96); display: none; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 40px 24px; }
    .picker-overlay.show { display: flex; }
    .picker-title { font-family: 'Courier New', monospace; text-rendering: optimizeSpeed; -webkit-font-smoothing: none; image-rendering: pixelated; font-size: 18px; font-weight: 900; letter-spacing: 4px; color: #00c6ff; margin-bottom: 12px; }
    .choice-card { display: flex; align-items: center; gap: 12px; width: 100%; max-width: 260px; padding: 14px 18px; background: rgba(255,255,255,.03); border: 2px solid rgba(255,255,255,.08); color: rgba(255,255,255,.6); font-family: 'Courier New', monospace; text-rendering: optimizeSpeed; -webkit-font-smoothing: none; image-rendering: pixelated; font-size: 14px; font-weight: 700; letter-spacing: 2px; text-decoration: none; cursor: pointer; transition: all .1s steps(2); }
    .choice-card:active { border-color: #00c6ff; color: #00c6ff; }
    .cc-icon { font-size: 22px; width: 32px; text-align: center; }
    .cc-name { flex: 1; }
    .cc-arrow { color: rgba(255,255,255,.2); }
    .pixel-back { position: absolute; top: 16px; left: 16px; background: none; border: none; color: rgba(255,255,255,.35); font-family: 'Courier New', monospace; text-rendering: optimizeSpeed; -webkit-font-smoothing: none; image-rendering: pixelated; font-size: 16px; cursor: pointer; }
    .pixel-cancel { margin-top: 8px; background: none; border: 2px solid rgba(255,255,255,.1); color: rgba(255,255,255,.3); padding: 8px 24px; font-family: 'Courier New', monospace; text-rendering: optimizeSpeed; -webkit-font-smoothing: none; image-rendering: pixelated; font-size: 12px; letter-spacing: 2px; cursor: pointer; }
    @media (max-width: 380px) { .logo-char { font-size: 32px; } .mode-grid { max-width: 240px; gap: 6px; } }
  </style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<div class="ui-layer">
  <div class="logo-block">
    <span class="logo-char">P</span><span class="logo-char">I</span><span class="logo-char">X</span>
    <span class="logo-char pink">P</span><span class="logo-char pink">I</span><span class="logo-char pink">U</span>
    <span class="logo-char pink">P</span><span class="logo-char pink">I</span><span class="logo-char pink">U</span>
  </div>
  <div class="tagline">一 起 P i u 一 P i u</div>
  <div class="subtitle">━━━ PIXEL BOUNCE ARENA ━━━</div>
  <a class="pixel-btn" onclick="showPicker('pMain')">▶ 开 始</a>
  <div class="mode-grid">
    <a class="mode-card" href="game-board.html?mode=ai&diff=easy"><span class="mode-icon">⊙</span> 简单</a>
    <a class="mode-card" href="game-board.html?mode=ai&diff=hard"><span class="mode-icon">◈</span> 困难</a>
    <a class="mode-card" href="game-board.html?mode=local"><span class="mode-icon">◫</span> 双人</a>
    <a class="mode-card" href="game-board.html?mode=network"><span class="mode-icon">◎</span> 联机</a>
  </div>
</div>
<div class="info-footer">
  <div class="info-row">P R E S S  S T A R T</div>
  <div class="info-row" style="font-size:8px">v0.3 · PIXPIUPIU · 1P / 2P / VS CPU</div>
</div>
<div class="picker-overlay" id="pMain">
  <div class="picker-title">S E L E C T</div>
  <div class="choice-card" onclick="showPicker('pSingle')"><span class="cc-icon">⊙</span><span class="cc-name">单人</span><span class="cc-arrow">▶</span></div>
  <div class="choice-card" onclick="showPicker('pDouble')"><span class="cc-icon">◫</span><span class="cc-name">双人</span><span class="cc-arrow">▶</span></div>
  <button class="pixel-cancel" onclick="hideAll()">CANCEL</button>
</div>
<div class="picker-overlay" id="pSingle">
  <button class="pixel-back" onclick="showPicker('pMain')">◀ BACK</button>
  <div class="picker-title">D I F F</div>
  <a class="choice-card" href="game-board.html?mode=ai&diff=easy"><span class="cc-icon">E</span><span class="cc-name">EASY 简单</span><span class="cc-arrow">▶</span></a>
  <a class="choice-card" href="game-board.html?mode=ai&diff=medium"><span class="cc-icon">N</span><span class="cc-name">NORMAL 普通</span><span class="cc-arrow">▶</span></a>
  <a class="choice-card" href="game-board.html?mode=ai&diff=hard"><span class="cc-icon">H</span><span class="cc-name">HARD 困难</span><span class="cc-arrow">▶</span></a>
  <button class="pixel-cancel" onclick="hideAll()">CANCEL</button>
</div>
<div class="picker-overlay" id="pDouble">
  <button class="pixel-back" onclick="showPicker('pMain')">◀ BACK</button>
  <div class="picker-title">2 P  M O D E</div>
  <a class="choice-card" href="game-board.html?mode=local"><span class="cc-icon">◫</span><span class="cc-name">同屏双人</span><span class="cc-arrow">▶</span></a>
  <a class="choice-card" href="game-board.html?mode=couple"><span class="cc-icon">♥</span><span class="cc-name">情侣对战</span><span class="cc-arrow">▶</span></a>
  <a class="choice-card" href="game-board.html?mode=network"><span class="cc-icon">◎</span><span class="cc-name">WiFi 联机</span><span class="cc-arrow">▶</span></a>
  <button class="pixel-cancel" onclick="hideAll()">CANCEL</button>
</div>
<script>
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);
const stars = [];
for (let i = 0; i < 60; i++) stars.push({ x: Math.floor(Math.random()*32)*Math.ceil(W/32), y: Math.floor(Math.random()*48)*Math.ceil(H/48), size: Math.random()>.7?2:1, blink: Math.random()*Math.PI*2, speed: .01+Math.random()*.03 });
const blocks = [];
for (let i = 0; i < 8; i++) blocks.push({ x: Math.random()*W, y: Math.random()*H, vx: (Math.random()-.5)*.4, vy: (Math.random()-.5)*.4, w: 4+Math.floor(Math.random()*4)*2, h: 4+Math.floor(Math.random()*4)*2, c: i%2?'#00c6ff':'#ff6090', a: .1+Math.random()*.15 });
function animate() {
  ctx.clearRect(0,0,W,H); ctx.fillStyle='#0a0a16'; ctx.fillRect(0,0,W,H);
  for (const s of stars) { s.blink += s.speed; const a = .15+.15*Math.sin(s.blink); ctx.fillStyle='rgba(0,198,255,'+a+')'; ctx.fillRect(s.x,s.y,s.size,s.size); }
  for (const b of blocks) { b.x+=b.vx; b.y+=b.vy; if(b.x<0)b.x=W; if(b.x>W)b.x=0; if(b.y<0)b.y=H; if(b.y>H)b.y=0; ctx.fillStyle=b.c; ctx.globalAlpha=b.a; ctx.fillRect(Math.floor(b.x/2)*2,Math.floor(b.y/2)*2,b.w,b.h); ctx.globalAlpha=1; }
  const bs=4; ctx.fillStyle='rgba(0,198,255,.06)'; for(let x=0;x<W;x+=bs*2){ctx.fillRect(x,0,bs,bs);ctx.fillRect(x,H-bs,bs,bs)} for(let y=bs;y<H-bs;y+=bs*2){ctx.fillRect(0,y,bs,bs);ctx.fillRect(W-bs,y,bs,bs)}
  requestAnimationFrame(animate);
}
animate();
function showPicker(which) { hideAll(); const map={pMain:'pMain',pSingle:'pSingle',pDouble:'pDouble'}; const el=document.getElementById(map[which]); if(el)el.classList.add('show'); }
function hideAll() { document.querySelectorAll('.picker-overlay').forEach(el=>el.classList.remove('show')); }
if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});
</script>
</body>
</html>
